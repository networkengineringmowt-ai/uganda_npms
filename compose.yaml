services:
  npms-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ${NPMS_IMAGE_NAME:-uganda-npms-backend}:${NPMS_IMAGE_TAG:-1.1.0}
    env_file:
      - path: .env
        required: false
    ports:
      - "${NPMS_PUBLISHED_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
